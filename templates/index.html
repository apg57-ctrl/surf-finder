<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Surf Finder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f5f5f5; color: #111; padding: 2rem; }
    h1 { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 1.5rem; }
    .filters { background: white; border-radius: 12px; border: 1px solid #e0e0e0; padding: 1.25rem; margin-bottom: 1.5rem; }
    .filter-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .filter-group label { font-size: 13px; color: #666; display: block; margin-bottom: 6px; }
    .filter-group select { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: white; }
    .slider-row { margin-bottom: 1rem; }
    .slider-label { display: flex; justify-content: space-between; font-size: 13px; color: #666; margin-bottom: 6px; }
    .slider-label span { font-weight: 600; color: #111; }
    input[type=range] { width: 100%; }
    .btn-row { display: flex; gap: 0.75rem; }
    .search-btn { flex: 1; padding: 12px; font-size: 15px; font-weight: 600; background: #111; color: white; border: none; border-radius: 8px; cursor: pointer; }
    .search-btn:hover { background: #333; }
    .refresh-btn { padding: 12px 20px; font-size: 14px; font-weight: 500; background: white; color: #666; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; }
    .refresh-btn:hover { background: #f5f5f5; }
    .results-header { font-size: 13px; color: #666; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
    .cache-badge { font-size: 11px; background: #e8f5e9; color: #2e7d32; padding: 3px 8px; border-radius: 20px; }
    .spot-card { background: white; border-radius: 12px; border: 1px solid #e0e0e0; padding: 1rem 1.25rem; margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center; }
    .spot-name { font-size: 16px; font-weight: 600; }
    .spot-location { font-size: 13px; color: #666; margin-top: 2px; }
    .badges { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .badge { font-size: 12px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
    .badge-ftg { background: #e6f4ea; color: #1e7e34; }
    .badge-good { background: #e3f0fb; color: #1565c0; }
    .badge-epic { background: #fff3e0; color: #e65100; }
    .badge-wave { background: #f0f0f0; color: #444; }
    .badge-region { background: #fef9e7; color: #7d6608; }
    .cam-btn { padding: 8px 18px; border-radius: 8px; border: 1px solid #ddd; background: white; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; text-decoration: none; color: #111; }
    .cam-btn:hover { background: #f5f5f5; }
    .empty { text-align: center; padding: 3rem; color: #666; }
    .loading-screen { display: none; margin-bottom: 1.5rem; }
    .loading-screen.active { display: block; }
    .ocean { width: 100%; height: 220px; border-radius: 12px; overflow: hidden; position: relative; background: linear-gradient(180deg, #87ceeb 0%, #4a9ebe 30%, #0a4a7a 100%); }
    .scan-text { position: absolute; top: 18px; width: 100%; text-align: center; color: rgba(255,255,255,0.95); font-size: 14px; font-weight: 500; letter-spacing: 0.06em; text-shadow: 0 1px 8px rgba(0,0,0,0.5); z-index: 20; }
    #wc { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <h1>🌊 Global Surf Finder</h1>
  <p class="subtitle">Find spots firing worldwide with live cams</p>

  <div class="filters">
    <div class="filter-row">
      <div class="filter-group">
        <label>Minimum conditions</label>
        <select id="condition">
          <option value="FAIR TO GOOD">Fair to good</option>
          <option value="GOOD">Good</option>
          <option value="GOOD TO EPIC">Good to epic</option>
          <option value="EPIC">Epic</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Region</label>
        <select id="region">
          <option value="Worldwide">Worldwide</option>
          <option value="North America">North America</option>
          <option value="Central America">Central America</option>
          <option value="South America">South America</option>
          <option value="Europe">Europe</option>
          <option value="Indonesia">Indonesia</option>
          <option value="Hawaii">Hawaii</option>
          <option value="Australia">Australia</option>
          <option value="Pacific Islands">Pacific Islands</option>
          <option value="Africa">Africa</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Must have cam</label>
        <select id="cam">
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>
      </div>
    </div>
    <div class="slider-row">
      <div class="slider-label">Minimum wave height <span id="wh-out">6 ft</span></div>
      <input type="range" min="1" max="20" value="6" step="1" id="wh-slider"
        oninput="document.getElementById('wh-out').textContent = this.value + ' ft'">
    </div>
    <div class="btn-row">
      <button class="search-btn" onclick="runSearch(false)">Search for firing spots</button>
      <button class="refresh-btn" onclick="runSearch(true)">↻ Refresh</button>
    </div>
  </div>

  <div class="loading-screen" id="loading">
    <div class="ocean" id="ocean">
      <div class="scan-text" id="loading-text">Scanning worldwide spots...</div>
      <canvas id="wc"></canvas>
    </div>
  </div>

  <div id="results-header" class="results-header" style="display:none;"></div>
  <div id="results"></div>

  <script>
    const canvas = document.getElementById('wc');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('ocean');
    let W, H, t = 0, animFrame;

    function resize() {
      W = canvas.width = container.offsetWidth;
      H = canvas.height = container.offsetHeight;
    }
    resize();

    function waveY(x, time) {
      const w1 = Math.sin((x / (W * 0.45)) + time * 0.6) * (H * 0.22);
      const w2 = Math.sin((x / (W * 0.2)) + time * 1.1) * (H * 0.04);
      const raw = w1 + w2;
      return (H * 0.62) - (raw > 0 ? Math.pow(raw / (H * 0.22), 0.55) * (H * 0.22) : raw);
    }

    function drawOcean() {
      const grad = ctx.createLinearGradient(0, H * 0.3, 0, H);
      grad.addColorStop(0, '#0e6ba8');
      grad.addColorStop(1, '#052d55');
      ctx.fillStyle = grad;
      ctx.fillRect(0, H * 0.3, W, H);

      ctx.beginPath();
      ctx.moveTo(0, H);
      for (let x = 0; x <= W; x += 3) {
        const y = (H * 0.58) - Math.sin((x / (W * 0.6)) + t * 0.4) * (H * 0.1);
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
      ctx.fillStyle = 'rgba(10,80,140,0.6)'; ctx.fill();

      ctx.beginPath();
      ctx.moveTo(0, H);
      for (let x = 0; x <= W; x += 2) {
        const y = waveY(x, t);
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
      const wg = ctx.createLinearGradient(0, H * 0.2, 0, H);
      wg.addColorStop(0, 'rgba(0,180,120,0.7)');
      wg.addColorStop(0.4, 'rgba(20,150,200,0.75)');
      wg.addColorStop(1, 'rgba(10,60,120,0.9)');
      ctx.fillStyle = wg; ctx.fill();

      ctx.beginPath();
      for (let x = 0; x <= W; x += 2) {
        const y = waveY(x, t);
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.strokeStyle = 'rgba(255,255,255,0.85)';
      ctx.lineWidth = 3; ctx.stroke();

      ctx.beginPath();
      for (let x = W * 0.1; x <= W * 0.55; x += 2) {
        const y = waveY(x, t) + 12;
        x === W * 0.1 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.strokeStyle = 'rgba(150,255,220,0.25)';
      ctx.lineWidth = 8; ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(0, H);
      for (let x = 0; x <= W; x += 3) {
        const y = (H * 0.82) + Math.sin((x / (W * 0.15)) + t * 1.8) * (H * 0.025);
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
      ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.fill();
    }

    function drawSpray() {
      const peakX = W * 0.68;
      const peakY = waveY(peakX, t);
      const intensity = 0.5 + Math.sin(t * 2) * 0.5;
      for (let i = 0; i < 18; i++) {
        const angle = -Math.PI * 0.8 + (Math.random() * Math.PI * 0.6);
        const speed = (Math.random() * 18 + 5) * intensity;
        const sx = peakX + Math.cos(angle) * speed * (1 + Math.sin(t + i) * 0.3);
        const sy = peakY + Math.sin(angle) * speed * (1 + Math.cos(t + i) * 0.3);
        const r = Math.random() * 2.5 + 0.5;
        ctx.beginPath();
        ctx.arc(sx, sy, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.6 + 0.3})`;
        ctx.fill();
      }
    }

    function drawSurfer() {
      const sx = W * 0.52;
      const sy = waveY(sx, t) - 2;
      const bob = Math.sin(t * 2.5) * 2;
      ctx.save();
      ctx.translate(sx, sy + bob);

      ctx.save();
      ctx.rotate(-0.18);
      const bg = ctx.createLinearGradient(-32, 0, 32, 0);
      bg.addColorStop(0, '#e0e0e0');
      bg.addColorStop(0.5, '#ffffff');
      bg.addColorStop(1, '#cccccc');
      ctx.fillStyle = bg;
      ctx.beginPath();
      ctx.ellipse(0, 4, 32, 6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 1; ctx.stroke();
      ctx.fillStyle = '#e53935';
      ctx.beginPath();
      ctx.ellipse(0, 4, 32, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#bbb';
      ctx.beginPath();
      ctx.moveTo(24, 6); ctx.lineTo(30, 14); ctx.lineTo(20, 10); ctx.closePath();
      ctx.fill();
      ctx.restore();

      const lean = Math.sin(t * 1.2) * 0.06 - 0.1;
      ctx.save();
      ctx.rotate(lean);

      ctx.fillStyle = '#f5c07a';
      ctx.beginPath(); ctx.ellipse(10, 2, 5, 2.5, -0.3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(-8, 1, 5, 2.5, 0.2, 0, Math.PI * 2); ctx.fill();

      ctx.strokeStyle = '#1a1a2e'; ctx.lineWidth = 5; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(10, 2); ctx.lineTo(8, -10); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-8, 1); ctx.lineTo(-5, -10); ctx.stroke();

      ctx.fillStyle = '#1a1a2e';
      ctx.beginPath();
      ctx.moveTo(-10, -10);
      ctx.quadraticCurveTo(-12, -22, -6, -28);
      ctx.quadraticCurveTo(0, -32, 6, -28);
      ctx.quadraticCurveTo(12, -22, 10, -10);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#2d4a8a';
      ctx.beginPath();
      ctx.moveTo(-5, -12); ctx.quadraticCurveTo(0, -30, 5, -12); ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = '#1a1a2e'; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(6, -24); ctx.quadraticCurveTo(18, -18, 22, -10); ctx.stroke();
      ctx.fillStyle = '#f5c07a';
      ctx.beginPath(); ctx.arc(22, -10, 3.5, 0, Math.PI * 2); ctx.fill();

      ctx.strokeStyle = '#1a1a2e'; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(-6, -24); ctx.quadraticCurveTo(-20, -20, -25, -12); ctx.stroke();
      ctx.fillStyle = '#f5c07a';
      ctx.beginPath(); ctx.arc(-25, -12, 3.5, 0, Math.PI * 2); ctx.fill();

      ctx.fillStyle = '#f5c07a';
      ctx.beginPath(); ctx.ellipse(0, -30, 4, 4, 0, 0, Math.PI * 2); ctx.fill();

      ctx.fillStyle = '#f5c07a';
      ctx.beginPath(); ctx.arc(0, -38, 8, 0, Math.PI * 2); ctx.fill();

      ctx.fillStyle = '#e53935';
      ctx.beginPath(); ctx.arc(0, -38, 8, Math.PI, 0); ctx.fill();
      ctx.fillStyle = '#c62828';
      ctx.beginPath(); ctx.arc(0, -38, 8, Math.PI * 1.1, Math.PI * 1.9); ctx.fill();

      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.arc(-3, -37, 1.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(3, -37, 1.5, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(0, -35, 3, 0.2, Math.PI - 0.2); ctx.stroke();

      ctx.restore();
      ctx.restore();
    }

    function loop() {
      ctx.clearRect(0, 0, W, H);
      drawOcean();
      drawSpray();
      drawSurfer();
      t += 0.018;
      animFrame = requestAnimationFrame(loop);
    }

    function startAnimation() { loop(); }
    function stopAnimation() { cancelAnimationFrame(animFrame); }

    function getBadgeClass(r) {
      if (r === "EPIC" || r === "GOOD TO EPIC") return "badge-epic";
      if (r === "GOOD") return "badge-good";
      return "badge-ftg";
    }
    function formatRating(r) { return r.charAt(0).toUpperCase() + r.slice(1).toLowerCase(); }

    function runSearch(forceRefresh) {
      const condition = document.getElementById("condition").value;
      const region = document.getElementById("region").value;
      const minHeight = document.getElementById("wh-slider").value;
      const resultsDiv = document.getElementById("results");
      const headerDiv = document.getElementById("results-header");
      const loadingDiv = document.getElementById("loading");
      resultsDiv.innerHTML = "";
      headerDiv.style.display = "none";
      loadingDiv.classList.add("active");
      document.getElementById("loading-text").textContent = forceRefresh ? "Running fresh scan... hang tight 🤙" : "Scanning worldwide spots...";
      resize();
      startAnimation();

      fetch(`/search?condition=${encodeURIComponent(condition)}&region=${encodeURIComponent(region)}&min_height=${minHeight}&refresh=${forceRefresh}`)
        .then(res => res.json())
        .then(data => {
          stopAnimation();
          loadingDiv.classList.remove("active");
          const spots = data.results;
          const fromCache = data.from_cache;
          if (!spots || spots.length === 0) {
            resultsDiv.innerHTML = '<div class="empty">No spots found. Try lowering your filters.</div>';
            return;
          }
          headerDiv.innerHTML = `<span>Found ${spots.length} spot${spots.length > 1 ? "s" : ""}</span>${fromCache ? '<span class="cache-badge">Cached — click ↻ to refresh</span>' : '<span class="cache-badge">Fresh scan</span>'}`;
          headerDiv.style.display = "flex";
          resultsDiv.innerHTML = spots.map(spot => `
            <div class="spot-card">
              <div>
                <div class="spot-name">${spot.name}</div>
                <div class="spot-location">${spot.city ? spot.city + ", " : ""}${spot.country}</div>
                <div class="badges">
                  <span class="badge ${getBadgeClass(spot.rating)}">${formatRating(spot.rating)}</span>
                  <span class="badge badge-wave">${spot.wave_min}-${spot.wave_max} ft</span>
                  <span class="badge badge-region">${spot.region}</span>
                </div>
              </div>
              <a href="${spot.url}" target="_blank" class="cam-btn">Watch cam</a>
            </div>`).join("");
        })
        .catch(() => {
          stopAnimation();
          loadingDiv.classList.remove("active");
          resultsDiv.innerHTML = '<div class="empty">Something went wrong.</div>';
        });
    }
  </script>
</body>
</html>
